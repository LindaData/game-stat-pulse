name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
  R2_PUBLIC_BASE_URL: https://lindadata.github.io/game-stat-pulse/data

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install data dependencies
        run: |
          python -m pip install --upgrade pip
          pip install duckdb pandas pyarrow requests pyyaml

      - name: Build review data catalog
        run: |
          python scripts/build_data_lake.py
          python scripts/fetch_api_football.py
          python scripts/profile_datasets.py
          python scripts/validate_datasets.py

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bun run test
      - run: bun run build

      - name: Add generated review data to the site
        run: |
          cp -R build dist/data
          cat > dist/data-source.json <<'EOF'
          {
            "catalog_url": "https://lindadata.github.io/game-stat-pulse/data/catalog/catalog.json",
            "fallback_mode": false,
            "notice": "GitHub Pages hosts limited review samples generated by GitHub Actions."
          }
          EOF
          cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
