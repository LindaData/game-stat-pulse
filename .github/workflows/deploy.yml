name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
  R2_PUBLIC_BASE_URL: https://lindadata.github.io/game-stat-pulse/data

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        if: github.event_name != 'pull_request'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install data dependencies
        if: github.event_name != 'pull_request'
        run: |
          python -m pip install --upgrade pip
          pip install duckdb pandas pyarrow requests pyyaml

      - name: Build review data catalog
        if: github.event_name != 'pull_request'
        continue-on-error: true
        run: |
          python scripts/build_data_lake.py
          python scripts/run_api_football_review.py
          python scripts/profile_datasets.py
          python scripts/validate_datasets.py
          touch build/.review-data-ready

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bun run test
      - run: bun run build

      - name: Add limited review samples to the site
        if: github.event_name != 'pull_request'
        run: |
          if [ -f build/.review-data-ready ] && [ -f build/catalog/catalog.json ]; then
            mkdir -p dist/data/catalog
            [ -d build/samples ] && cp -R build/samples dist/data/samples
            [ -d build/metadata ] && cp -R build/metadata dist/data/metadata
            python - <<'PY'
          import json
          from pathlib import Path

          source = Path("build/catalog/catalog.json")
          target = Path("dist/data/catalog/catalog.json")
          catalog = json.loads(source.read_text(encoding="utf-8"))
          for entry in catalog.get("entries", []):
              if not isinstance(entry, dict):
                  continue
              entry["parquet_url"] = None
              entry["raw_json_url"] = None
              entry["raw_json_prefix"] = None
              entry["review_scope"] = "all_discovered_columns_limited_rows"
          target.write_text(json.dumps(catalog, indent=2), encoding="utf-8")
          PY
            cat > dist/data-source.json <<'EOF'
          {
            "catalog_url": "https://lindadata.github.io/game-stat-pulse/data/catalog/catalog.json",
            "fallback_mode": false,
            "notice": "GitHub Pages hosts limited review samples generated by GitHub Actions."
          }
          EOF
          else
            echo "No generated review catalog found; deploying with the fallback data-source.json."
          fi

      - name: Add SPA fallback
        if: github.event_name != 'pull_request'
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

      - uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        with:
          path: dist

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
