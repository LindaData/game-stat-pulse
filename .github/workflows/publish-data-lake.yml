name: Publish Data Lake to R2

on:
  workflow_dispatch:
  schedule:
    # Daily at 12:00 UTC
    - cron: "0 12 * * *"

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install duckdb pandas pyarrow requests pyyaml

      - name: Build bronze + silver + samples + catalog
        env:
          # If absent, paths in catalog.json remain relative (local-build mode).
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: python scripts/build_data_lake.py

      - name: Profile datasets
        run: python scripts/profile_datasets.py

      - name: Validate datasets
        run: python scripts/validate_datasets.py

      - name: Upload build artifact (local testing fallback)
        if: ${{ env.R2_ACCESS_KEY_ID == '' }}
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        uses: actions/upload-artifact@v4
        with:
          name: data-lake-build
          path: build
          retention-days: 7

      - name: Configure rclone for Cloudflare R2
        if: ${{ secrets.R2_ACCESS_KEY_ID != '' }}
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_ACCESS_KEY_ID}
          secret_access_key = ${R2_SECRET_ACCESS_KEY}
          endpoint = https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com
          acl = private
          EOF

      - name: Install rclone
        if: ${{ secrets.R2_ACCESS_KEY_ID != '' }}
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Upload build/ to R2
        if: ${{ secrets.R2_ACCESS_KEY_ID != '' }}
        env:
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          rclone copy --transfers 8 --checkers 16 --s3-no-check-bucket build "r2:${R2_BUCKET_NAME}"
          echo "Uploaded to R2 bucket: ${R2_BUCKET_NAME}"
